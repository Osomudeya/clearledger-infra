# Stage 5 version of ledger-service deployment
# Changes from Stage 0:
#   - Vault agent annotations added
#   - DATABASE_URL secretKeyRef removed
#   - serviceAccountName set
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service
  namespace: clearledger
  labels:
    app: ledger-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ledger-service
  template:
    metadata:
      labels:
        app: ledger-service
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "ledger-service"
        vault.hashicorp.com/agent-inject-secret-database_url: "clearledger/data/ledger-service"
        vault.hashicorp.com/agent-inject-template-database_url: |
          {{- with secret "clearledger/data/ledger-service" -}}
          {{ .Data.data.database_url }}
          {{- end }}
        vault.hashicorp.com/agent-pre-populate-only: "false"
        vault.hashicorp.com/agent-set-security-context: "true"
        vault.hashicorp.com/agent-run-as-user: "1000"
        vault.hashicorp.com/agent-run-as-group: "1000"
        vault.hashicorp.com/agent-requests-cpu: "50m"
        vault.hashicorp.com/agent-requests-mem: "64Mi"
        vault.hashicorp.com/agent-limits-cpu: "200m"
        vault.hashicorp.com/agent-limits-mem: "128Mi"
    spec:
      serviceAccountName: ledger-service
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: ledger-service
          # Kustomize placeholder — CI updates tags in kustomization.yaml
          image: clearledger/ledger-service:gitops
          ports:
            - containerPort: 8000
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.clearledger.svc.cluster.local"
            - name: REDIS_URL
              value: "redis://redis.clearledger.svc.cluster.local:6379"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
